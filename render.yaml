services:
  - type: web
    name: impactbridge-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MONGO_URI
        sync: false       # You will paste this in Render dashboard
      - key: DB_NAME
        value: impactbridge
      - key: FRONTEND_URL
        sync: false       # You will paste your Vercel URL here
